name: Keepalive ping

# Supabase free tier pauses projects after ~7 days without activity.
# Ping the health endpoint (which reads the database) twice a week.
on:
  schedule:
    - cron: '0 8 * * 1,4' # Mondays and Thursdays at 08:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health
        run: |
          curl --fail --silent --show-error https://gen-grid.vercel.app/api/health
